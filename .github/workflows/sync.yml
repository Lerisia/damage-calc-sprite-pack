name: Build sprite packs

on:
  # Nightly catch-up for Showdown CDN additions (new Pokémon, new
  # community art for Z-A Megas, etc.).
  schedule:
    - cron: '17 4 * * *'  # 04:17 UTC daily
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Fetch Pokémon list from damage-calc main
        run: |
          mkdir -p data
          for f in gen1 gen2 gen3 gen4 gen5 gen6 gen7 gen8 gen9 \
                   forms mega alola galar hisui paldea; do
            curl -sSL "https://raw.githubusercontent.com/Lerisia/damage-calc/main/assets/pokemon/${f}.json" \
              -o "data/${f}.json"
          done
          ls -la data/

      - name: Install Pillow (for icon-sheet slicing)
        run: pip install Pillow

      # Box icons (gen1-7 base species) are built first so
      # build_packs.py can nest them under icons/ inside each style
      # zip — the app extracts both in one import.
      - name: Build box icons (gen1-7 base species only)
        run: python3 build_icons.py

      - name: Build sprite packs (each style + bundled icons)
        run: python3 build_packs.py

      - name: Show pack sizes
        run: |
          ls -lh packs/

      # Stage individual sprite files into sprites/<style>/ + sprites/
      # icons/ at repo root. The damage-calc web build reads these via
      # cdn.jsdelivr.net/gh — Showdown's own CDN doesn't send CORS
      # headers, which CanvasKit's image pipeline requires, so the
      # web app needs a CORS-friendly mirror. GitHub raw / jsDelivr
      # both serve with access-control-allow-origin: *.
      - name: Stage extracted sprites for jsDelivr
        run: |
          rm -rf sprites
          mkdir -p sprites/bw sprites/dex sprites/icons
          cp -r work/bw/. sprites/bw/
          cp -r work/dex/. sprites/dex/
          cp -r work/icons/. sprites/icons/
          # Manifest so future tooling can tell which files belong
          # to which pack at a glance.
          {
            echo "Built: $(date -u +'%Y-%m-%d %H:%M UTC')"
            echo "bw: $(ls sprites/bw | wc -l) files"
            echo "dex: $(ls sprites/dex | wc -l) files"
            echo "icons: $(ls sprites/icons | wc -l) files"
          } > sprites/MANIFEST.txt

      - name: Commit sprite tree if changed
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add sprites
          if git diff --cached --quiet; then
            echo "No sprite tree changes."
          else
            git commit -m "auto: refresh extracted sprite tree"
            git push origin main
          fi

      - name: Re-create 'latest' release with the published packs
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -e
          # Delete previous release + tag so the new one's assets and
          # build date are clearly the current set. The 'latest' tag is
          # what damage-calc's import URL points at.
          gh release delete latest --yes --cleanup-tag 2>/dev/null || true
          gh release create latest \
            packs/bw.zip packs/dex.zip \
            --title "Latest sprite packs ($(date -u +%Y-%m-%d))" \
            --notes "Auto-built from play.pokemonshowdown.com/sprites/ on $(date -u +'%Y-%m-%d %H:%M UTC'). bw.zip is scoped to gen1-5 species + their gen1-5-era formes so it only contains art derived from the original Game Freak BW games (no X/Y Sprite Project community extensions until that group's permission lands). dex.zip mirrors the full HOME 3D set. Both packs also bundle gen1-7 box icons (40×30 Sun/Moon-era official art, scoped to base species so no gen8+ community-extension work is redistributed). Animated (ani) pack intentionally not published yet — same community-attribution reason as the bw/icons exclusions. See the repo's README.md for the credit and licensing context."
